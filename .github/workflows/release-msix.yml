on:
  push:
    tags:
      - "v*"
    # branches:
    #   - master
name: Build-Release[MSIX]

jobs:
  build_and_package:
    runs-on: windows-latest
    # 配置环境
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"
      - run: echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."
      # 下拉仓库
      - name: Check out repository code
        uses: actions/checkout@v5
      - name: List files in the repository
        run: |
          echo '' > ${{ secrets.OASX_RELEASE }}
          ls ${{ github.workspace }}
      - name: Build Window
        uses: DamianReeves/write-file-action@master
        with:
          path: ${{ secrets.WINDOWS_PATH_KEY }}
          contents: ${{ secrets.WINDOWS_PATH_VALUES }}
          write-mode: append
      - run: echo "🍏 This job's status is ${{ job.status }}."

      - name: "Read file contents"
        uses: andstor/file-reader-action@v1
        with:
          path: ${{ secrets.WINDOWS_PATH_KEY }}

      # 最新的发布url
      - name: Get latest release
        id: get_release
        uses: actions/github-script@v4
        with:
          github-token: ${{ secrets.RELEASE_TOKEN }}
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            let release = null;
            for (let attempt = 1; attempt <= 20; attempt++) {
              try {
                const response = await github.repos.getReleaseByTag({ owner, repo, tag });
                release = response.data;
                break;
              } catch (error) {
                if (error.status === 404 && attempt < 20) {
                  core.info(`Release not found for ${tag}. Waiting... (${attempt}/20)`);
                  await wait(15000);
                  continue;
                }
                throw error;
              }
            }

            if (!release) {
              throw new Error(`Release not found for tag: ${tag}`);
            }

            const tagWithoutV = release.tag_name.replace(/^v/, '');
            const buildName = tagWithoutV.split('+')[0];
            const isPrereleaseTag = release.tag_name.includes('-');
            const runNumber = process.env.GITHUB_RUN_NUMBER || '1';
            const buildNumber = isPrereleaseTag ? runNumber : '1';
            const version = `${buildName}+${buildNumber}`;

            core.setOutput('upload_url', release.upload_url);
            core.setOutput('tag_name', release.tag_name);
            core.setOutput('version', version);
      # 修改 yaml 版本号
      - name: Update version
        uses: fjogeleit/yaml-update-action@main
        with:
          valueFile: "pubspec.yaml"
          propertyPath: "version"
          value: ${{ steps.get_release.outputs.version }}
          commitChange: false
      # 同步 版本号到msix
      - name: Update msix version
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install ruamel.yaml
          python ./script/sync_version.py
      # ----------------------------------------------------------------------------------------
      # 下载 Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.1"
          channel: "stable"
      # 下载依赖
      - name: Install dependencies
        run: flutter pub get
      # 构建
      - uses: microsoft/microsoft-store-apppublisher@v1.2
      - name: Configure the Microsoft Store CLI
        run: msstore reconfigure  --tenantId ${{ secrets.AZURE_AD_TENANT_ID }} --clientId ${{ secrets.AZURE_AD_APPLICATION_CLIENT_ID }} --clientSecret ${{ secrets.AZURE_AD_APPLICATION_SECRET }} --sellerId ${{ secrets.SELLER_ID }}
      - run: msstore apps list
      - run: msstore package .
      - run: msstore publish -v -prp 99.9
