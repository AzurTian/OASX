on:
  push:
    tags:
      - v*
name: Build-Release[Android]

jobs:
  release:
    runs-on: ubuntu-latest
    # 配置环境
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"
      - run: echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."
      # 下拉仓库
      - name: Check out repository code
        uses: actions/checkout@v3
      # 下载 Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.1'
          channel: 'stable'
      # 下载 Java JDK
      - name: Setup Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: "21"
      - name: List files in the repository
        run: |
          echo '' > ${{ secrets.OASX_RELEASE }}
          ls ${{ github.workspace }}
      - run: echo "🍏 This job's status is ${{ job.status }}."
      - run: flutter --version
      - run: java -version
      # 下载依赖
      - name: Install dependencies
        run: flutter pub get
      # 最新的发布url
      - name: Get latest release
        id: get_release
        uses: actions/github-script@v4
        with:
          github-token: ${{ secrets.RELEASE_TOKEN }}
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            let release = null;
            for (let attempt = 1; attempt <= 20; attempt++) {
              try {
                const response = await github.repos.getReleaseByTag({ owner, repo, tag });
                release = response.data;
                break;
              } catch (error) {
                if (error.status === 404 && attempt < 20) {
                  core.info(`Release not found for ${tag}. Waiting... (${attempt}/20)`);
                  await wait(15000);
                  continue;
                }
                throw error;
              }
            }

            if (!release) {
              throw new Error(`Release not found for tag: ${tag}`);
            }

            const tagWithoutV = release.tag_name.replace(/^v/, '');
            const buildName = tagWithoutV.split('+')[0];
            const isPrereleaseTag = release.tag_name.includes('-');
            const runNumber = process.env.GITHUB_RUN_NUMBER || '1';
            const buildNumber = isPrereleaseTag ? runNumber : '1';
            const version = `${buildName}+${buildNumber}`;

            core.setOutput('upload_url', release.upload_url);
            core.setOutput('tag_name', release.tag_name);
            core.setOutput('version', version);
      # 修改 yaml 版本号
      - name: Update version
        uses: fjogeleit/yaml-update-action@main
        with:
          valueFile: 'pubspec.yaml'
          propertyPath: 'version'
          value: ${{ steps.get_release.outputs.version }}
          commitChange: false

      # 构建通用胖 apk
      - name: Build universal APK
        run: flutter build apk --release
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # 构建分 abi apk
      - name: Build split-per-abi APKs
        run: flutter build apk --release --split-per-abi
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # 上传通用胖 apk
      - name: Upload universal APK
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        with:
          upload_url: ${{ steps.get_release.outputs.upload_url }}
          asset_path: ./build/app/outputs/flutter-apk/app-release.apk
          asset_name: oasx_${{ steps.get_release.outputs.tag_name }}_universal.apk
          asset_content_type: application/vnd.android.package-archive

      # 上传 armeabi-v7a apk
      - name: Upload armeabi-v7a APK
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        with:
          upload_url: ${{ steps.get_release.outputs.upload_url }}
          asset_path: ./build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          asset_name: oasx_${{ steps.get_release.outputs.tag_name }}_armeabi-v7a.apk
          asset_content_type: application/vnd.android.package-archive

      # 上传 arm64-v8a apk
      - name: Upload arm64-v8a APK
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        with:
          upload_url: ${{ steps.get_release.outputs.upload_url }}
          asset_path: ./build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          asset_name: oasx_${{ steps.get_release.outputs.tag_name }}_arm64-v8a.apk
          asset_content_type: application/vnd.android.package-archive

      # 上传 x86_64 apk
      - name: Upload x86_64 APK
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        with:
          upload_url: ${{ steps.get_release.outputs.upload_url }}
          asset_path: ./build/app/outputs/flutter-apk/app-x86_64-release.apk
          asset_name: oasx_${{ steps.get_release.outputs.tag_name }}_x86_64.apk
          asset_content_type: application/vnd.android.package-archive
