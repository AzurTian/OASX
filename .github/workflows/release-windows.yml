on:
  push:
    tags:
      - "v*"
    # branches:
    #   - master
name: Build-Release[Windows]

jobs:
  build_and_package:
    runs-on: windows-latest
    # 配置环境
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"
      - run: echo '🔎 The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}'
      # 下拉仓库
      - name: Check out repository code
        uses: actions/checkout@v3
      # 下载 Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.1"
          channel: "stable"
      - name: List files in the repository
        run: |
          echo '' > ${{ secrets.OASX_RELEASE }}
          ls ${{ github.workspace }}
      - name: Build Window
        uses: DamianReeves/write-file-action@master
        with:
          path: ${{ secrets.WINDOWS_PATH_KEY }}
          contents: ${{ secrets.WINDOWS_PATH_VALUES }}
          write-mode: append
      - run: echo "🍏 This job's status is ${{ job.status }}."
      - run: flutter --version
      - name: "Read file contents"
        uses: andstor/file-reader-action@v1
        with:
          path: ${{ secrets.WINDOWS_PATH_KEY }}
      # 下载依赖
      - name: Install dependencies
        run: flutter pub get
      # 最新的发布url
      - name: Get latest release
        id: get_release
        uses: actions/github-script@v4
        with:
          github-token: ${{ secrets.RELEASE_TOKEN }}
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            let release = null;
            for (let attempt = 1; attempt <= 20; attempt++) {
              try {
                const response = await github.repos.getReleaseByTag({ owner, repo, tag });
                release = response.data;
                break;
              } catch (error) {
                if (error.status === 404 && attempt < 20) {
                  core.info(`Release not found for ${tag}. Waiting... (${attempt}/20)`);
                  await wait(15000);
                  continue;
                }
                throw error;
              }
            }

            if (!release) {
              throw new Error(`Release not found for tag: ${tag}`);
            }

            const tagWithoutV = release.tag_name.replace(/^v/, '');
            const buildName = tagWithoutV.split('+')[0];
            const isPrereleaseTag = release.tag_name.includes('-');
            const runNumber = process.env.GITHUB_RUN_NUMBER || '1';
            const buildNumber = isPrereleaseTag ? runNumber : '1';
            const version = `${buildName}+${buildNumber}`;

            core.setOutput('upload_url', release.upload_url);
            core.setOutput('tag_name', release.tag_name);
            core.setOutput('version', version);
      # 修改 yaml 版本号
      - name: Update version
        uses: fjogeleit/yaml-update-action@main
        with:
          valueFile: "pubspec.yaml"
          propertyPath: "version"
          value: ${{ steps.get_release.outputs.version }}
          commitChange: false
      # 构建
      - name: Build Flutter Windows app
        id: build
        run: flutter build windows
      # 安装UPX
      - name: Install UPX
        run: |
          choco install upx -y
          echo "UPX version:"
          upx --version
      # 使用UPX优化体积
      - name: Compress exe/dll with UPX
        run: |
          cd build/windows/x64/runner/Release
          upx --best --lzma *.exe || true
          upx --best --lzma *.dll || true
      # 打包
      - name: Package Release zip
        run: |
          cd build/windows/x64/runner/Release
          7z a ${{ github.workspace }}/build/oasx_${{ steps.get_release.outputs.tag_name }}_windows.zip *
      # 发布到 Release
      - name: Upload Release Windows
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        with:
          upload_url: ${{ steps.get_release.outputs.upload_url }} # This pulls from the CREATE RELEASE step above, referencing it's ID to get its outputs object, which include a `upload_url`. See this blog post for more info: https://jasonet.co/posts/new-features-of-github-actions/#passing-data-to-future-steps
          asset_path: ./build/oasx_${{ steps.get_release.outputs.tag_name }}_windows.zip
          asset_name: oasx_${{ steps.get_release.outputs.tag_name }}_windows.zip
          asset_content_type: application/gzip
