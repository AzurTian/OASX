name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.35.1"
  DART_VERSION: "3.9.0"
  JAVA_VERSION: "17"
  PYTHON_VERSION: "3.12"
  WEB_BASE_HREF: "/OASX/"

jobs:
  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      build_name: ${{ steps.meta.outputs.build_name }}
      build_number: ${{ steps.meta.outputs.build_number }}
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          tag_name="${GITHUB_REF_NAME}"
          version_core="${tag_name#v}"
          build_name="${version_core%%+*}"
          build_number="1"
          prerelease="false"

          if [[ "$tag_name" == *-* ]]; then
            build_number="${GITHUB_RUN_NUMBER}"
            prerelease="true"
          fi

          {
            echo "tag_name=$tag_name"
            echo "build_name=$build_name"
            echo "build_number=$build_number"
            echo "version=$build_name+$build_number"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"

      - name: Extract latest changelog
        shell: bash
        run: python ./script/extract_changelog.py

      - name: Create release if needed
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
          TAG_NAME: ${{ steps.meta.outputs.tag_name }}
          PRERELEASE: ${{ steps.meta.outputs.prerelease }}
        shell: bash
        run: |
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release $TAG_NAME already exists."
            exit 0
          fi

          if [[ "$PRERELEASE" == "true" ]]; then
            gh release create "$TAG_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Release $TAG_NAME" \
              --notes-file CHANGELATEST.md \
              --prerelease
          else
            gh release create "$TAG_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Release $TAG_NAME" \
              --notes-file CHANGELATEST.md
          fi

  build_windows:
    name: Build Windows
    runs-on: windows-latest
    needs: create_release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Verify SDK versions
        shell: pwsh
        run: |
          $flutterOutput = ((flutter --version) | Out-String).Trim()
          $flutterOutput
          if ($flutterOutput -notmatch "Flutter $env:FLUTTER_VERSION") {
            throw "Expected Flutter $env:FLUTTER_VERSION"
          }

          $dartOutput = ((dart --version 2>&1) | Out-String).Trim()
          $dartOutput
          if ($dartOutput -notmatch "Dart SDK version: $env:DART_VERSION") {
            throw "Expected Dart $env:DART_VERSION"
          }

      - name: Restore Windows release file
        env:
          WINDOWS_RELEASE_PATH: ${{ secrets.WINDOWS_PATH_KEY }}
          WINDOWS_RELEASE_CONTENT: ${{ secrets.WINDOWS_PATH_VALUES }}
        shell: pwsh
        run: |
          if (
            [string]::IsNullOrWhiteSpace($env:WINDOWS_RELEASE_PATH) -or
            [string]::IsNullOrWhiteSpace($env:WINDOWS_RELEASE_CONTENT)
          ) {
            Write-Host 'Skip restoring Windows release file because required secrets are empty.'
            exit 0
          }

          $path = $env:WINDOWS_RELEASE_PATH
          $directory = Split-Path -Path $path -Parent
          if (![string]::IsNullOrWhiteSpace($directory)) {
            New-Item -ItemType Directory -Force -Path $directory | Out-Null
          }
          Set-Content -Path $path -Value $env:WINDOWS_RELEASE_CONTENT -Encoding UTF8

      - name: Install dependencies
        shell: pwsh
        run: flutter pub get

      - name: Build Windows app
        shell: pwsh
        run: |
          flutter build windows --release `
            --build-name "${{ needs.create_release.outputs.build_name }}" `
            --build-number "${{ needs.create_release.outputs.build_number }}"

      - name: Install UPX
        shell: pwsh
        run: choco install upx -y

      - name: Compress Windows binaries
        shell: pwsh
        run: |
          $releasePath = Join-Path $env:GITHUB_WORKSPACE 'build/windows/x64/runner/Release'
          if (!(Test-Path $releasePath)) {
            $releasePath = Join-Path $env:GITHUB_WORKSPACE 'build/windows/runner/Release'
          }
          Push-Location $releasePath
          try {
            Get-ChildItem -Filter *.exe | ForEach-Object { & upx --best --lzma $_.Name }
            Get-ChildItem -Filter *.dll | ForEach-Object { & upx --best --lzma $_.Name }
          } finally {
            Pop-Location
          }

      - name: Package Windows release
        id: package
        shell: pwsh
        run: |
          $releasePath = Join-Path $env:GITHUB_WORKSPACE 'build/windows/x64/runner/Release'
          if (!(Test-Path $releasePath)) {
            $releasePath = Join-Path $env:GITHUB_WORKSPACE 'build/windows/runner/Release'
          }
          $assetName = "oasx_${{ needs.create_release.outputs.tag_name }}_windows.zip"
          $assetPath = Join-Path $env:GITHUB_WORKSPACE $assetName
          if (Test-Path $assetPath) {
            Remove-Item $assetPath -Force
          }
          Compress-Archive -Path (Join-Path $releasePath '*') -DestinationPath $assetPath
          "asset_name=$assetName" >> $env:GITHUB_OUTPUT
          "asset_path=$assetPath" >> $env:GITHUB_OUTPUT

      - name: Upload Windows asset
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
        shell: pwsh
        run: |
          gh release upload "${{ needs.create_release.outputs.tag_name }}" `
            "${{ steps.package.outputs.asset_path }}" `
            --repo "$env:GITHUB_REPOSITORY" `
            --clobber

  build_android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: create_release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Verify SDK versions
        shell: bash
        run: |
          flutter_output="$(flutter --version)"
          echo "$flutter_output"
          if [[ "$flutter_output" != *"Flutter ${FLUTTER_VERSION}"* ]]; then
            echo "Expected Flutter ${FLUTTER_VERSION}"
            exit 1
          fi

          dart_output="$(dart --version 2>&1)"
          echo "$dart_output"
          if [[ "$dart_output" != *"Dart SDK version: ${DART_VERSION}"* ]]; then
            echo "Expected Dart ${DART_VERSION}"
            exit 1
          fi

          java_output="$(java -version 2>&1 | head -n 1)"
          echo "$java_output"
          if [[ "$java_output" != *"\"${JAVA_VERSION}"* ]]; then
            echo "Expected Java ${JAVA_VERSION}"
            exit 1
          fi

      - name: Install dependencies
        shell: bash
        run: flutter pub get

      - name: Build universal APK
        shell: bash
        run: |
          flutter build apk --release \
            --build-name "${{ needs.create_release.outputs.build_name }}" \
            --build-number "${{ needs.create_release.outputs.build_number }}"

      - name: Build split-per-abi APKs
        shell: bash
        run: |
          flutter build apk --release --split-per-abi \
            --build-name "${{ needs.create_release.outputs.build_name }}" \
            --build-number "${{ needs.create_release.outputs.build_number }}"

      - name: Upload Android assets
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
          TAG_NAME: ${{ needs.create_release.outputs.tag_name }}
        shell: bash
        run: |
          assets=(
            "build/app/outputs/flutter-apk/app-release.apk#oasx_${TAG_NAME}_universal.apk"
            "build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk#oasx_${TAG_NAME}_armeabi-v7a.apk"
            "build/app/outputs/flutter-apk/app-arm64-v8a-release.apk#oasx_${TAG_NAME}_arm64-v8a.apk"
            "build/app/outputs/flutter-apk/app-x86_64-release.apk#oasx_${TAG_NAME}_x86_64.apk"
          )

          for asset in "${assets[@]}"; do
            gh release upload "$TAG_NAME" "$asset" --repo "$GITHUB_REPOSITORY" --clobber
          done

  build_web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: create_release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Verify SDK versions
        shell: bash
        run: |
          flutter_output="$(flutter --version)"
          echo "$flutter_output"
          if [[ "$flutter_output" != *"Flutter ${FLUTTER_VERSION}"* ]]; then
            echo "Expected Flutter ${FLUTTER_VERSION}"
            exit 1
          fi

          dart_output="$(dart --version 2>&1)"
          echo "$dart_output"
          if [[ "$dart_output" != *"Dart SDK version: ${DART_VERSION}"* ]]; then
            echo "Expected Dart ${DART_VERSION}"
            exit 1
          fi

      - name: Install dependencies
        shell: bash
        run: flutter pub get

      - name: Build web app
        shell: bash
        run: |
          flutter build web --release \
            --base-href "${{ env.WEB_BASE_HREF }}" \
            --build-name "${{ needs.create_release.outputs.build_name }}" \
            --build-number "${{ needs.create_release.outputs.build_number }}"

      - name: Deploy to GitHub Pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN || github.token }}
          branch: page
          folder: build/web
