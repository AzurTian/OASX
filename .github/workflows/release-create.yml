on:
    push:
      # Sequence of patterns matched against refs/tags
      tags: 
        - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
      
name: Release[tag]

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      # 查询发布  
      - name: Check if release exists
        id: check_release
        uses: actions/github-script@v4
        with:
          github-token: ${{ secrets.RELEASE_TOKEN }}
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            try {
              await github.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              return true;
            } catch (error) {
              if (error.status === 404) {
                return false;
              }
              throw error;
            }
      # 提取change
      - name: Extract changelog
        id: extract_changelog
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: python ./script/extract_changelog.py


      # 创建发布  
      - name: Create Release
        id: create_release
        if: startsWith(github.ref, 'refs/tags/') && steps.check_release.outputs.result == 'false'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }} # This token is provided by Actions, you do not need to create your own token
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body_path: ./CHANGELATEST.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
